name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node.js 20 ────────────────────────────────────────
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Instalar dependencias ─────────────────────────────
      - name: Instalar dependencias npm
        run: npm install

      # ── 5. Crear carpeta www y copiar archivos ────────────────
      - name: Preparar carpeta www (webDir)
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp style.css  www/style.css

      # ── 6. Agregar plataforma Android ────────────────────────
      - name: Agregar Android
        run: npx cap add android

      # ── 7. Sincronizar Capacitor ─────────────────────────────
      - name: Sincronizar Capacitor
        run: npx cap sync android

      # ── 8. Agregar permisos al AndroidManifest ───────────────
      - name: Agregar permisos Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CALL_PHONE" />\n    <uses-permission android:name="android.permission.READ_CONTACTS" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.FLASHLIGHT" />\n    <uses-feature android:name="android.hardware.camera.flash" android:required="false" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.INTERNET" />\n</manifest>|' "$MANIFEST"

      # ── 9. Cache Gradle ──────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Compilar APK debug ───────────────────────────────
      - name: Compilar APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 11. Subir APK como artefacto ─────────────────────────
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Asistente-APK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30