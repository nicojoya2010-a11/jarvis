name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node.js ──────────────────────────────
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 4. Instalar dependencias ─────────────────
      - name: Instalar dependencias
        run: npm install

      # ── 5. Inicializar Capacitor + Android ────────
      - name: Inicializar Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      # ── 6. Permisos Android ─────────────────────
      - name: Agregar permisos al AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Inserta permisos antes de <application
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CALL_PHONE" />\n    <uses-permission android:name="android.permission.READ_CONTACTS" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.FLASHLIGHT" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-feature android:name="android.hardware.camera.flash" android:required="false" />\n    <application|' "$MANIFEST"

      # ── 7. Gradle cache ─────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 8. Build APK debug ──────────────────────
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 9. Upload APK ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Asistente-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
